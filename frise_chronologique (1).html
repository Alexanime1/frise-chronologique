<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ma Frise Chronologique</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#12100e;--ink2:#54504a;--ink3:#9a9488;
  --paper:#fdfaf5;--paper2:#f5f0e8;--paper3:#ece4d6;--paper4:#ddd2c0;
  --font-head:'Playfair Display',Georgia,serif;
  --font-body:'DM Sans','Helvetica Neue',sans-serif;
  --r:10px;--rlg:18px;--rxl:26px;
  --sh:0 2px 24px rgba(18,16,14,.07);
  --shlg:0 8px 48px rgba(18,16,14,.14);
}
@media(prefers-color-scheme:dark){
  :root{
    --ink:#f0ebe0;--ink2:#a09080;--ink3:#6b5e50;
    --paper:#161210;--paper2:#1e1a14;--paper3:#28221a;--paper4:#352d22;
    --sh:0 2px 24px rgba(0,0,0,.3);--shlg:0 8px 48px rgba(0,0,0,.4);
  }
}

/* CAT COLORS — vibrant palette */
:root{
  --c-pol:#4f6ef7;   --c-pol-bg:rgba(79,110,247,.13);
  --c-sci:#16b07a;   --c-sci-bg:rgba(22,176,122,.13);
  --c-art:#e8652a;   --c-art-bg:rgba(232,101,42,.13);
  --c-gue:#e03b5a;   --c-gue-bg:rgba(224,59,90,.13);
  --c-aut:#9b5cf6;   --c-aut-bg:rgba(155,92,246,.13);
  --gold:#c8a050;--gold2:#e8c070;--gold-l:rgba(200,160,80,.1);
}

html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--paper);color:var(--ink);min-height:100vh}

/* ═══ HEADER ═══ */
.site-header{
  padding:2.5rem 2rem 2rem;text-align:center;
  background:var(--paper2);border-bottom:1px solid var(--paper3);
  position:relative;overflow:hidden;
}
.site-header::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 60% 80% at 20% 50%,var(--c-pol-bg),transparent),
    radial-gradient(ellipse 50% 70% at 80% 50%,var(--c-aut-bg),transparent),
    radial-gradient(ellipse 40% 60% at 50% 100%,var(--gold-l),transparent);
  pointer-events:none;
}
.header-ornament{
  font-size:10.5px;letter-spacing:.4em;color:var(--gold);
  text-transform:uppercase;margin-bottom:.6rem;font-weight:500;
}
.site-title{
  font-family:var(--font-head);font-size:clamp(2rem,5vw,3.2rem);
  font-weight:700;line-height:1.1;margin-bottom:.4rem;
  background:linear-gradient(135deg,var(--ink) 0%,var(--c-pol) 50%,var(--c-aut) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.site-subtitle{font-size:13.5px;color:var(--ink2);max-width:420px;margin:0 auto}

/* ═══ PAGE ═══ */
.page{max-width:1200px;margin:0 auto;padding:0 1.25rem 4rem}

/* ═══ TOOLBAR ═══ */
.toolbar{
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  padding:1.1rem 0 1rem;border-bottom:1px solid var(--paper3);margin-bottom:1.25rem;
}
.btn{
  font-family:var(--font-body);font-size:12.5px;font-weight:500;
  padding:7px 16px;border-radius:100px;
  border:1px solid var(--paper4);background:var(--paper2);color:var(--ink2);
  cursor:pointer;transition:all .18s;white-space:nowrap;
}
.btn:hover{background:var(--paper3);color:var(--ink);border-color:var(--paper4)}
.btn.primary{
  background:linear-gradient(135deg,var(--c-pol),var(--c-aut));
  color:#fff;border:none;font-weight:500;
}
.btn.primary:hover{opacity:.88;transform:translateY(-1px)}
.zoom-label{font-size:12px;color:var(--ink3);min-width:40px;text-align:center}
.sep{width:1px;height:18px;background:var(--paper3);flex-shrink:0}

/* ═══ SEARCH BAR ═══ */
.search-bar{
  display:flex;align-items:center;gap:10px;
  padding:.85rem 1rem;margin-bottom:1.1rem;
  background:var(--paper2);border:1.5px solid var(--paper3);
  border-radius:var(--rlg);box-shadow:var(--sh);
  transition:border-color .2s,box-shadow .2s;
}
.search-bar:focus-within{border-color:var(--c-pol);box-shadow:0 0 0 3px rgba(79,110,247,.1),var(--sh)}
.search-icon{font-size:16px;flex-shrink:0;opacity:.5}
.search-bar input{
  flex:1;background:none;border:none;outline:none;
  font-family:var(--font-body);font-size:14px;color:var(--ink);
}
.search-bar input::placeholder{color:var(--ink3)}
.search-clear{
  background:none;border:none;cursor:pointer;
  font-size:14px;color:var(--ink3);padding:2px 6px;border-radius:50%;
  transition:background .15s;display:none;
}
.search-clear.show{display:block}
.search-clear:hover{background:var(--paper3)}
/* results dropdown */
#search-results{
  position:relative;margin-top:-4px;margin-bottom:1rem;
  background:var(--paper);border:1px solid var(--paper3);
  border-radius:var(--r);overflow:hidden;
  box-shadow:var(--shlg);display:none;
  max-height:280px;overflow-y:auto;
}
#search-results.open{display:block}
.sr-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 16px;cursor:pointer;border-bottom:1px solid var(--paper3);
  transition:background .12s;
}
.sr-item:last-child{border-bottom:none}
.sr-item:hover{background:var(--paper2)}
.sr-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.sr-title{font-size:13.5px;font-weight:500;font-family:var(--font-head)}
.sr-meta{font-size:11.5px;color:var(--ink3);margin-top:1px}
.sr-empty{padding:16px;text-align:center;font-size:13px;color:var(--ink3)}
mark{background:linear-gradient(135deg,rgba(79,110,247,.25),rgba(155,92,246,.2));color:inherit;border-radius:3px;padding:0 1px}

/* ═══ LEGEND ═══ */
.legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.1rem}
.legend-item{
  display:flex;align-items:center;gap:6px;
  font-size:11.5px;font-weight:500;cursor:pointer;
  padding:5px 13px;border-radius:100px;
  border:1px solid transparent;transition:all .18s;
}
.legend-item:hover{filter:brightness(.9)}

/* ═══ TIMELINE ═══ */
#tl-wrap{
  border-radius:var(--rxl);border:1px solid var(--paper3);
  background:var(--paper2);overflow:hidden;
  cursor:grab;user-select:none;position:relative;
  box-shadow:var(--sh);
}
#tl-wrap.dragging{cursor:grabbing}
#tl-svg{display:block;width:100%}

/* ═══ TOOLTIP ═══ */
#tooltip{
  position:fixed;pointer-events:none;
  background:var(--ink);color:var(--paper);
  border-radius:var(--r);padding:10px 14px;
  font-size:12px;z-index:200;max-width:240px;
  line-height:1.5;display:none;
  box-shadow:var(--shlg);font-family:var(--font-body);
}
#tooltip strong{display:block;font-size:13px;margin-bottom:2px;font-family:var(--font-head)}
#tooltip .ty{font-size:10.5px;letter-spacing:.04em;margin-bottom:3px}
#tooltip .td{color:rgba(240,235,224,.65);font-size:11px;margin-top:3px}

/* ═══ CARD POPUP ═══ */
#card-popup{
  display:none;position:fixed;z-index:250;
  width:min(310px,90vw);
  background:var(--paper);border:1px solid var(--paper3);
  border-radius:var(--rxl);overflow:hidden;
  box-shadow:var(--shlg);
  animation:popIn .22s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn{from{opacity:0;transform:scale(.92) translateY(8px)}to{opacity:1;transform:none}}
.card-img{width:100%;height:155px;object-fit:cover;display:block}
.card-stripe{height:5px;width:100%}
.card-body{padding:1rem 1.25rem 1.2rem}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.5rem}
.card-cat{
  font-size:10px;letter-spacing:.08em;text-transform:uppercase;
  font-weight:600;padding:3px 10px;border-radius:100px;
}
.card-year{font-size:12px;color:var(--ink3);margin-top:2px}
.card-title{font-family:var(--font-head);font-size:17px;font-weight:500;line-height:1.25;margin-bottom:.5rem}
.card-desc{font-size:13px;color:var(--ink2);line-height:1.6;margin-bottom:.85rem}
.card-actions{display:flex;gap:8px}
.card-btn-edit{
  flex:1;font-family:var(--font-body);font-size:12px;font-weight:500;
  padding:8px;border-radius:100px;cursor:pointer;
  border:none;transition:opacity .15s;
}
.card-btn-edit:hover{opacity:.82}
.card-btn-close{
  font-family:var(--font-body);font-size:12px;
  padding:8px 14px;border-radius:100px;cursor:pointer;
  background:transparent;color:var(--ink2);border:1px solid var(--paper3);
}
.card-btn-close:hover{background:var(--paper2)}

/* ═══ MODAL ═══ */
#modal-bg{
  display:none;position:fixed;inset:0;
  background:rgba(18,16,14,.55);backdrop-filter:blur(5px);
  z-index:300;align-items:center;justify-content:center;
}
#modal-bg.open{display:flex}
#modal{
  background:var(--paper);border:1px solid var(--paper3);
  border-radius:var(--rxl);padding:2rem;
  width:min(540px,95vw);max-height:92vh;overflow-y:auto;
  box-shadow:var(--shlg);
  animation:slideUp .25s cubic-bezier(.34,1.2,.64,1);
}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.modal-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid var(--paper3);
}
.modal-header h2{font-family:var(--font-head);font-size:21px;font-weight:500}
.modal-close{background:none;border:none;font-size:18px;color:var(--ink3);cursor:pointer;padding:4px 8px;border-radius:var(--r)}
.modal-close:hover{background:var(--paper2)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid .span2{grid-column:span 2}
.form-row label{
  display:block;font-size:10.5px;letter-spacing:.07em;text-transform:uppercase;
  color:var(--ink3);margin-bottom:6px;font-weight:500;
}
.form-row input,.form-row textarea,.form-row select{
  width:100%;font-size:14px;font-family:var(--font-body);
  border:1.5px solid var(--paper3);border-radius:var(--r);
  background:var(--paper2);color:var(--ink);padding:10px 13px;
  outline:none;transition:border-color .15s;
}
.form-row input:focus,.form-row textarea:focus,.form-row select:focus{border-color:var(--c-pol)}
.form-row textarea{height:88px;resize:vertical}

/* image zone */
.img-zone{
  border:2px dashed var(--paper4);border-radius:var(--rlg);
  padding:1.25rem;text-align:center;cursor:pointer;
  transition:border-color .2s,background .2s;position:relative;overflow:hidden;
}
.img-zone:hover{border-color:var(--c-pol);background:rgba(79,110,247,.04)}
.img-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.img-zone-ico{font-size:26px;margin-bottom:.4rem;display:block}
.img-zone p{font-size:13px;color:var(--ink2)}
.img-zone small{font-size:11px;color:var(--ink3)}
#img-preview{display:none;margin-top:12px;text-align:center}
#img-preview img{max-height:130px;max-width:100%;border-radius:var(--r);object-fit:cover;box-shadow:var(--sh)}
.remove-img{
  display:inline-block;margin-top:8px;font-size:12px;color:#e03b5a;
  cursor:pointer;text-decoration:underline;background:none;border:none;font-family:var(--font-body);
}
/* cat color swatches */
.cat-picker{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.cat-swatch{
  display:flex;align-items:center;gap:6px;
  font-size:12px;font-weight:500;cursor:pointer;
  padding:6px 12px;border-radius:100px;
  border:2px solid transparent;transition:all .15s;
}
.cat-swatch.selected{border-color:var(--ink)!important}

/* modal buttons */
.modal-btns{display:flex;gap:10px;justify-content:flex-end;margin-top:1.5rem;flex-wrap:wrap}
.btn-save{
  background:linear-gradient(135deg,var(--c-pol),var(--c-aut));
  color:#fff;border:none;border-radius:100px;
  padding:10px 26px;font-size:13px;font-family:var(--font-body);cursor:pointer;font-weight:500;
  transition:opacity .15s,transform .15s;
}
.btn-save:hover{opacity:.88;transform:translateY(-1px)}
.btn-cancel{
  background:transparent;color:var(--ink2);border:1px solid var(--paper3);
  border-radius:100px;padding:10px 18px;font-size:13px;
  font-family:var(--font-body);cursor:pointer;
}
.btn-cancel:hover{background:var(--paper2)}
.btn-del{
  background:transparent;color:#e03b5a;border:1px solid var(--paper3);
  border-radius:100px;padding:10px 14px;font-size:13px;
  font-family:var(--font-body);cursor:pointer;margin-right:auto;
}
.btn-del:hover{background:rgba(224,59,90,.07)}

footer{text-align:center;font-size:11px;color:var(--ink3);padding:2rem 0 0;letter-spacing:.04em}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-ornament">✦ Chronologie Personnelle ✦</div>
  <h1 class="site-title">Ma Frise Chronologique</h1>
  <p class="site-subtitle">Naviguez dans le temps · Ajoutez vos événements · Illustrez l'histoire</p>
</header>

<div class="page">

  <!-- TOOLBAR -->
  <div class="toolbar">
    <button class="btn" onclick="zoom(-1)">− Zoom</button>
    <span class="zoom-label" id="zoom-lbl">100%</span>
    <button class="btn" onclick="zoom(1)">+ Zoom</button>
    <div class="sep"></div>
    <button class="btn" onclick="resetView()">Vue d'ensemble</button>
    <div class="sep"></div>
    <button class="btn primary" onclick="openAddModal()">＋ Ajouter un événement</button>
  </div>

  <!-- SEARCH -->
  <div class="search-bar" id="search-bar">
    <span class="search-icon">🔍</span>
    <input type="text" id="search-input" placeholder="Rechercher un événement, une date, une catégorie…" oninput="onSearch(this.value)" autocomplete="off"/>
    <button class="search-clear" id="search-clear" onclick="clearSearch()" title="Effacer">✕</button>
  </div>
  <div id="search-results"></div>

  <!-- LEGEND -->
  <div class="legend" id="legend"></div>

  <!-- TIMELINE -->
  <div id="tl-wrap">
    <svg id="tl-svg" height="330"></svg>
  </div>

  <footer>Données sauvegardées dans votre navigateur · Cliquez sur un événement pour le détailler</footer>
</div>

<!-- TOOLTIP -->
<div id="tooltip"></div>

<!-- CARD POPUP -->
<div id="card-popup">
  <div id="cp-img-wrap"></div>
  <div class="card-stripe" id="cp-stripe"></div>
  <div class="card-body">
    <div class="card-top">
      <span class="card-cat" id="cp-cat"></span>
      <span class="card-year" id="cp-year"></span>
    </div>
    <div class="card-title" id="cp-title"></div>
    <div class="card-desc" id="cp-desc"></div>
    <div class="card-actions">
      <button class="card-btn-edit" id="cp-edit">✏️ Modifier</button>
      <button class="card-btn-close" onclick="closeCard()">Fermer</button>
    </div>
  </div>
</div>

<!-- MODAL -->
<div id="modal-bg">
  <div id="modal">
    <div class="modal-header">
      <h2 id="modal-title">Nouvel événement</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="form-grid">
      <div class="form-row span2"><label>Titre *</label><input id="f-title" type="text" placeholder="Ex : Révolution française"/></div>
      <div class="form-row"><label>Année * (négatif = av. J.-C.)</label><input id="f-year" type="number" placeholder="Ex : 1789"/></div>
      <div class="form-row"><label>Catégorie</label>
        <div class="cat-picker" id="cat-picker"></div>
        <input type="hidden" id="f-cat" value="autre"/>
      </div>
      <div class="form-row span2"><label>Description</label><textarea id="f-desc" placeholder="Quelques mots sur cet événement…"></textarea></div>
      <div class="form-row span2">
        <label>Image (optionnelle)</label>
        <div class="img-zone" id="img-zone">
          <input type="file" accept="image/*" id="f-img" onchange="handleImgUpload(this)"/>
          <span class="img-zone-ico">🖼️</span>
          <p>Cliquez ou glissez une image ici</p>
          <small>JPG, PNG, GIF, WebP</small>
        </div>
        <div id="img-preview">
          <img id="img-preview-el" src="" alt=""/>
          <button class="remove-img" onclick="removeImg()">Supprimer l'image</button>
        </div>
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn-del" id="btn-del" onclick="deleteEvent()" style="display:none">🗑 Supprimer</button>
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-save" onclick="saveEvent()">Enregistrer</button>
    </div>
  </div>
</div>

<script>
/* ══ DATA ══ */
const CATS={
  politique:{color:'#4f6ef7',bg:'rgba(79,110,247,.13)',label:'Politique',emoji:'🏛'},
  science:  {color:'#16b07a',bg:'rgba(22,176,122,.13)',label:'Science & Tech',emoji:'🔬'},
  art:      {color:'#e8652a',bg:'rgba(232,101,42,.13)',label:'Art & Culture',emoji:'🎨'},
  guerre:   {color:'#e03b5a',bg:'rgba(224,59,90,.13)', label:'Guerre',emoji:'⚔️'},
  autre:    {color:'#9b5cf6',bg:'rgba(155,92,246,.13)',label:'Autre',emoji:'✦'},
};

const SK='frise_v3';
const DEFAULTS=[
  {id:1, year:-3000,title:"Invention de l'écriture",    desc:"Les Sumériens inventent l'écriture cunéiforme en Mésopotamie.",cat:'science',img:''},
  {id:2, year:-776, title:"Premiers Jeux Olympiques",    desc:"Jeux panhelléniques organisés à Olympie en l'honneur de Zeus.",cat:'autre',img:''},
  {id:3, year:-44,  title:"Assassinat de Jules César",   desc:"Poignardé aux Ides de Mars au Sénat de Rome.",cat:'politique',img:''},
  {id:4, year:476,  title:"Chute de Rome",               desc:"Fin de l'Empire romain d'Occident.",cat:'guerre',img:''},
  {id:5, year:1095, title:"Première Croisade",           desc:"Le pape Urbain II prêche la Croisade vers Jérusalem.",cat:'guerre',img:''},
  {id:6, year:1440, title:"Gutenberg & l'imprimerie",    desc:"La presse à caractères mobiles révolutionne la diffusion du savoir.",cat:'science',img:''},
  {id:7, year:1492, title:"Christophe Colomb",           desc:"Découverte de l'Amérique pour les Européens.",cat:'politique',img:''},
  {id:8, year:1610, title:"Galilée et le télescope",     desc:"Galilée observe les lunes de Jupiter.",cat:'science',img:''},
  {id:9, year:1687, title:"Principia de Newton",         desc:"Publication des lois de la gravitation universelle.",cat:'science',img:''},
  {id:10,year:1789, title:"Révolution française",        desc:"Prise de la Bastille, fin de l'Ancien Régime.",cat:'politique',img:''},
  {id:11,year:1804, title:"Beethoven — 3ᵉ Symphonie",   desc:"L'Héroïque marque le tournant du romantisme musical.",cat:'art',img:''},
  {id:12,year:1865, title:"Abolition de l'esclavage",    desc:"13ᵉ amendement aux États-Unis après la guerre de Sécession.",cat:'politique',img:''},
  {id:13,year:1905, title:"Théorie de la relativité",    desc:"Einstein publie ses travaux fondamentaux.",cat:'science',img:''},
  {id:14,year:1945, title:"Fin de la Seconde Guerre",    desc:"Capitulation de l'Allemagne puis du Japon.",cat:'guerre',img:''},
  {id:15,year:1969, title:"Premiers pas sur la Lune",    desc:"Neil Armstrong lors d'Apollo 11.",cat:'science',img:''},
  {id:16,year:1989, title:"Chute du mur de Berlin",      desc:"Réunification symbolique de l'Allemagne.",cat:'politique',img:''},
  {id:17,year:2004, title:"Naissance de Facebook",       desc:"Mark Zuckerberg lance le réseau social depuis Harvard.",cat:'science',img:''},
];

function loadEv(){try{const s=localStorage.getItem(SK);return s?JSON.parse(s):DEFAULTS}catch{return DEFAULTS}}
function saveEv(){try{localStorage.setItem(SK,JSON.stringify(events))}catch{}}

let events=loadEv();
let nextId=Math.max(...events.map(e=>e.id),0)+1;
let scale=1,offsetX=0,svgW=900;
const H=330,AY=172;
let editId=null,activeId=null,highlightId=null;
let dragging=false,dsx=0,dsox=0;
let hiddenCats=new Set();
let pendingImg='';

const svgEl=document.getElementById('tl-svg');
const wrap=document.getElementById('tl-wrap');
const tip=document.getElementById('tooltip');
const cardPopup=document.getElementById('card-popup');

/* ══ BUILD CAT PICKER ══ */
function buildCatPicker(selected){
  const p=document.getElementById('cat-picker');
  p.innerHTML=Object.entries(CATS).map(([k,v])=>`
    <div class="cat-swatch ${k===selected?'selected':''}"
      style="background:${v.bg};color:${v.color};border-color:${k===selected?v.color:'transparent'}"
      onclick="selectCat('${k}',this)"
    >${v.emoji} ${v.label}</div>
  `).join('');
  document.getElementById('f-cat').value=selected||'autre';
}
function selectCat(k,el){
  document.getElementById('f-cat').value=k;
  document.querySelectorAll('.cat-swatch').forEach(s=>{
    s.classList.remove('selected');
    s.style.borderColor='transparent';
  });
  el.classList.add('selected');
  el.style.borderColor=CATS[k].color;
}

/* ══ RANGE / SCALE ══ */
function getRange(){
  const vis=events.filter(e=>!hiddenCats.has(e.cat));
  if(!vis.length)return{minY:0,maxY:2024};
  return{minY:Math.min(...vis.map(e=>e.year)),maxY:Math.max(...vis.map(e=>e.year))};
}
function yearToX(y){const{minY}=getRange();return 80+(y-minY)*scale+offsetX}
function defScale(){const{minY,maxY}=getRange();return Math.max(.001,(svgW-160)/(maxY-minY||1))}
function resetView(){scale=defScale();offsetX=0;render();updZoom()}
function zoom(d){scale*=d>0?1.5:1/1.5;render();updZoom()}
function updZoom(){document.getElementById('zoom-lbl').textContent=Math.round(scale/defScale()*100)+'%'}
function tickIv(){const yv=svgW/scale;for(const iv of[1,2,5,10,25,50,100,200,500,1000,2000,5000,10000])if(svgW/(yv/iv)>75)return iv;return 10000}

/* ══ RENDER ══ */
function render(){
  svgW=wrap.clientWidth||900;
  svgEl.setAttribute('width',svgW);svgEl.setAttribute('height',H);
  const{minY,maxY}=getRange();
  const iv=tickIv();
  let h='';

  /* era bands */
  const bands=[
    {from:-4000,to:500,label:'Antiquité',color:'rgba(200,160,80,.04)'},
    {from:500,to:1500,label:'Moyen Âge',color:'rgba(79,110,247,.04)'},
    {from:1500,to:1800,label:'Moderne',color:'rgba(22,176,122,.04)'},
    {from:1800,to:2100,label:'Contemporain',color:'rgba(155,92,246,.04)'},
  ];
  bands.forEach(b=>{
    const x1=Math.max(0,yearToX(b.from)),x2=Math.min(svgW,yearToX(b.to));
    if(x2<0||x1>svgW)return;
    h+=`<rect x="${x1}" y="0" width="${Math.max(0,x2-x1)}" height="${H}" fill="${b.color}"/>`;
    if(x2-x1>60){
      const mx=Math.min(Math.max(x1+10,x1+(x2-x1)/2-20),svgW-50);
      h+=`<text x="${mx}" y="16" font-size="9.5" fill="var(--ink3)" font-family="'DM Sans',sans-serif" letter-spacing=".08em" opacity=".6" text-transform="uppercase">${b.label.toUpperCase()}</text>`;
    }
  });

  /* vertical grid */
  const st=Math.ceil((minY-iv*2)/iv)*iv,en=Math.floor((maxY+iv*2)/iv)*iv;
  for(let y=st;y<=en;y+=iv){
    const x=yearToX(y);if(x<-5||x>svgW+5)continue;
    h+=`<line x1="${x}" y1="20" x2="${x}" y2="${H}" stroke="var(--paper3)" stroke-width=".5" opacity=".7"/>`;
  }

  /* axis */
  h+=`<line x1="0" y1="${AY}" x2="${svgW}" y2="${AY}" stroke="var(--gold)" stroke-width="1.5" opacity=".5"/>`;

  /* ticks */
  for(let y=st;y<=en;y+=iv){
    const x=yearToX(y);if(x<-5||x>svgW+5)continue;
    h+=`<line x1="${x}" y1="${AY-6}" x2="${x}" y2="${AY+6}" stroke="var(--gold)" stroke-width="1" opacity=".6"/>`;
    const lbl=y<0?Math.abs(y)+' av.':y===0?'0':y;
    h+=`<text x="${x}" y="${AY+22}" text-anchor="middle" font-size="10" fill="var(--ink3)" font-family="'DM Sans',sans-serif">${lbl}</text>`;
  }

  /* place events */
  const visible=events.filter(e=>!hiddenCats.has(e.cat)).sort((a,b)=>a.year-b.year);
  const placed=[];const rLast={};
  visible.forEach((ev,i)=>{
    const x=yearToX(ev.year);
    let row=i%2===0?-1:1;
    for(let t=0;t<12;t++){if(!rLast[row]||x-rLast[row]>88){rLast[row]=x;break}row=row<0?row-1:row+1;}
    placed.push({...ev,row,x});
  });

  placed.forEach(ev=>{
    const x=ev.x;if(x<-70||x>svgW+70)return;
    const cat=CATS[ev.cat]||CATS.autre;
    const c=cat.color;
    const above=ev.row<0;
    const depth=Math.abs(ev.row);
    const stemLen=Math.min(50+depth*30,115);
    const labelY=above?AY-stemLen:AY+stemLen;
    const label=ev.title.length>24?ev.title.slice(0,23)+'…':ev.title;
    const bw=Math.min(label.length*7+28,185);
    const hasImg=!!ev.img;
    const bh=hasImg?56:38;
    const bx=Math.max(4,Math.min(x-bw/2,svgW-bw-4));
    const by=above?labelY-bh:labelY;
    const yr=ev.year<0?Math.abs(ev.year)+' av.':ev.year;
    const isActive=ev.id===activeId;
    const isHighlight=ev.id===highlightId;
    const op=isHighlight?1:highlightId?0.25:1;

    /* glow for active */
    if(isActive)h+=`<circle cx="${x}" cy="${AY}" r="12" fill="${c}" opacity="0.15"/>`;
    if(isHighlight)h+=`<rect x="${bx-4}" y="${by-4}" width="${bw+8}" height="${bh+8}" rx="12" fill="${c}" opacity="0.18"/>`;

    /* stem */
    h+=`<line x1="${x}" y1="${AY+(above?-6:6)}" x2="${x}" y2="${above?by+bh:by}" stroke="${c}" stroke-width="1" stroke-dasharray="2 3" opacity="${.5*op}"/>`;

    /* dot */
    h+=`<circle cx="${x}" cy="${AY}" r="7" fill="${c}" opacity="${.15*op}" data-id="${ev.id}"/>`;
    h+=`<circle cx="${x}" cy="${AY}" r="${isActive?5.5:4.5}" fill="${c}" stroke="var(--paper2)" stroke-width="2" style="cursor:pointer;opacity:${op}" data-id="${ev.id}"/>`;

    /* card */
    const shadow=isActive?`filter:drop-shadow(0 4px 12px ${c}40)`:'';
    h+=`<rect x="${bx}" y="${by}" width="${bw}" height="${bh}" rx="8" fill="var(--paper)" stroke="${c}" stroke-width="${isActive?1.5:.75}" style="cursor:pointer;opacity:${op};${shadow}" data-id="${ev.id}"/>`;

    /* colored left bar */
    h+=`<rect x="${bx}" y="${by+4}" width="3" height="${bh-8}" rx="1.5" fill="${c}" opacity="${.8*op}" style="pointer-events:none"/>`;

    if(hasImg){
      h+=`<image href="${ev.img}" x="${bx+4}" y="${by+4}" width="46" height="${bh-8}" preserveAspectRatio="xMidYMid slice" style="cursor:pointer;opacity:${op}" data-id="${ev.id}" clip-path="inset(0 0 0 0 round 6px)"/>`;
      h+=`<text x="${bx+56}" y="${by+16}" font-size="11" font-weight="500" fill="${c}" font-family="'Playfair Display',serif" style="cursor:pointer;opacity:${op}" data-id="${ev.id}">${label}</text>`;
      h+=`<text x="${bx+56}" y="${by+30}" font-size="9.5" fill="${c}" opacity="${.65*op}" font-family="'DM Sans',sans-serif" data-id="${ev.id}" style="cursor:pointer">${yr}</text>`;
    }else{
      h+=`<text x="${bx+11}" y="${by+15}" font-size="11" font-weight="500" fill="${c}" font-family="'Playfair Display',serif" style="cursor:pointer;opacity:${op}" data-id="${ev.id}">${label}</text>`;
      h+=`<text x="${bx+11}" y="${by+28}" font-size="9.5" fill="${c}" opacity="${.65*op}" font-family="'DM Sans',sans-serif" data-id="${ev.id}" style="cursor:pointer">${yr}</text>`;
    }
  });

  svgEl.innerHTML=h;
  svgEl.querySelectorAll('[data-id]').forEach(el=>{
    const id=parseInt(el.dataset.id);
    el.addEventListener('click',e=>{e.stopPropagation();openCard(id,e)});
    el.addEventListener('mousemove',e=>showTip(e,id));
    el.addEventListener('mouseleave',()=>{tip.style.display='none'});
  });
  renderLegend();
}

/* ══ TOOLTIP ══ */
function showTip(e,id){
  const ev=events.find(x=>x.id===id);if(!ev)return;
  const cat=CATS[ev.cat]||CATS.autre;
  const yr=ev.year<0?Math.abs(ev.year)+' av. J.-C.':ev.year;
  tip.style.display='block';
  tip.style.left=(e.clientX+18)+'px';tip.style.top=(e.clientY-22)+'px';
  tip.innerHTML=`<strong>${ev.title}</strong><div class="ty" style="color:${cat.color}">${yr} · ${cat.emoji} ${cat.label}</div>${ev.desc?`<div class="td">${ev.desc.slice(0,85)}${ev.desc.length>85?'…':''}</div>`:''}`;
}

/* ══ CARD ══ */
function openCard(id,e){
  const ev=events.find(x=>x.id===id);if(!ev)return;
  const cat=CATS[ev.cat]||CATS.autre;
  const yr=ev.year<0?Math.abs(ev.year)+' av. J.-C.':ev.year;
  document.getElementById('cp-img-wrap').innerHTML=ev.img
    ?`<img class="card-img" src="${ev.img}" alt="${ev.title}"/>`:'';
  document.getElementById('cp-stripe').style.background=ev.img?'none':`linear-gradient(90deg,${cat.color},${cat.color}88)`;
  document.getElementById('cp-stripe').style.height=ev.img?'0':'5px';
  const catEl=document.getElementById('cp-cat');
  catEl.textContent=`${cat.emoji} ${cat.label}`;
  catEl.style.background=cat.bg;catEl.style.color=cat.color;
  document.getElementById('cp-year').textContent=yr;
  document.getElementById('cp-title').textContent=ev.title;
  document.getElementById('cp-desc').textContent=ev.desc||'Aucune description.';
  const editBtn=document.getElementById('cp-edit');
  editBtn.onclick=()=>{closeCard();openEditModal(id)};
  editBtn.style.background=`linear-gradient(135deg,${cat.color},${cat.color}bb)`;
  editBtn.style.color='#fff';
  cardPopup.style.display='block';
  const vw=window.innerWidth,vh=window.innerHeight,pw=320,ph=400;
  cardPopup.style.left=Math.min(e.clientX+18,vw-pw-10)+'px';
  cardPopup.style.top=Math.min(e.clientY-50,vh-ph-10)+'px';
  activeId=id;render();
}
function closeCard(){cardPopup.style.display='none';activeId=null;render()}
document.addEventListener('click',e=>{if(!cardPopup.contains(e.target)&&!e.target.dataset.id)closeCard()});

/* ══ LEGEND ══ */
function renderLegend(){
  document.getElementById('legend').innerHTML=Object.entries(CATS).map(([k,v])=>{
    const on=!hiddenCats.has(k);
    return `<div class="legend-item" style="background:${on?v.bg:'var(--paper2)'};color:${on?v.color:'var(--ink3)'};border-color:${on?v.color:'var(--paper4)'};opacity:${on?1:.55}" onclick="toggleCat('${k}')">
      ${v.emoji} ${v.label}
    </div>`;
  }).join('');
}
function toggleCat(k){hiddenCats.has(k)?hiddenCats.delete(k):hiddenCats.add(k);render()}

/* ══ SEARCH ══ */
function highlight(str,query){
  if(!query)return str;
  const re=new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return str.replace(re,'<mark>$1</mark>');
}
function onSearch(q){
  const btn=document.getElementById('search-clear');
  btn.classList.toggle('show',q.length>0);
  const res=document.getElementById('search-results');
  if(!q.trim()){res.classList.remove('open');highlightId=null;render();return}
  const ql=q.toLowerCase();
  // check if it's a year search
  const yearNum=parseInt(q);
  const matched=events.filter(ev=>{
    const yr=ev.year<0?Math.abs(ev.year)+' avant':String(ev.year);
    return ev.title.toLowerCase().includes(ql)||
           (ev.desc||'').toLowerCase().includes(ql)||
           CATS[ev.cat].label.toLowerCase().includes(ql)||
           String(ev.year).includes(q)||yr.includes(ql)||
           (!isNaN(yearNum)&&Math.abs(ev.year-yearNum)<50);
  }).sort((a,b)=>Math.abs(a.year-(yearNum||0))-Math.abs(b.year-(yearNum||0)));
  if(!matched.length){
    res.innerHTML=`<div class="sr-empty">Aucun résultat pour « ${q} »</div>`;
    res.classList.add('open');highlightId=null;render();return;
  }
  res.innerHTML=matched.slice(0,8).map(ev=>{
    const cat=CATS[ev.cat]||CATS.autre;
    const yr=ev.year<0?Math.abs(ev.year)+' av. J.-C.':ev.year;
    return `<div class="sr-item" onclick="goToEvent(${ev.id})">
      <div class="sr-dot" style="background:${cat.color}"></div>
      <div>
        <div class="sr-title">${highlight(ev.title,q)}</div>
        <div class="sr-meta">${yr} · ${cat.emoji} ${cat.label}</div>
      </div>
    </div>`;
  }).join('');
  res.classList.add('open');
}
function clearSearch(){
  document.getElementById('search-input').value='';
  document.getElementById('search-results').classList.remove('open');
  document.getElementById('search-clear').classList.remove('show');
  highlightId=null;render();
}
function goToEvent(id){
  const ev=events.find(e=>e.id===id);if(!ev)return;
  document.getElementById('search-results').classList.remove('open');
  highlightId=id;
  // center the event
  const{minY}=getRange();
  scale=defScale()*4;
  offsetX=(svgW/2)-80-(ev.year-minY)*scale;
  render();updZoom();
  // flash highlight
  setTimeout(()=>{highlightId=null;render()},2000);
}

/* ══ IMAGE ══ */
function handleImgUpload(input){
  const file=input.files[0];if(!file)return;
  if(file.size>4*1024*1024){alert('Image trop lourde (max ~3 Mo)');return}
  const r=new FileReader();
  r.onload=e=>{
    pendingImg=e.target.result;
    document.getElementById('img-preview').style.display='block';
    document.getElementById('img-preview-el').src=pendingImg;
    document.getElementById('img-zone').style.display='none';
  };
  r.readAsDataURL(file);
}
function removeImg(){
  pendingImg='';
  document.getElementById('img-preview').style.display='none';
  document.getElementById('img-preview-el').src='';
  document.getElementById('img-zone').style.display='block';
  document.getElementById('f-img').value='';
}

/* ══ MODAL ══ */
function openAddModal(){
  editId=null;pendingImg='';
  document.getElementById('modal-title').textContent='Nouvel événement';
  document.getElementById('f-title').value='';
  document.getElementById('f-year').value=new Date().getFullYear();
  document.getElementById('f-desc').value='';
  removeImg();buildCatPicker('autre');
  document.getElementById('btn-del').style.display='none';
  document.getElementById('modal-bg').classList.add('open');
  setTimeout(()=>document.getElementById('f-title').focus(),60);
}
function openEditModal(id){
  const ev=events.find(e=>e.id===id);if(!ev)return;
  editId=id;pendingImg=ev.img||'';
  document.getElementById('modal-title').textContent='Modifier l\'événement';
  document.getElementById('f-title').value=ev.title;
  document.getElementById('f-year').value=ev.year;
  document.getElementById('f-desc').value=ev.desc||'';
  buildCatPicker(ev.cat);
  if(ev.img){
    document.getElementById('img-preview').style.display='block';
    document.getElementById('img-preview-el').src=ev.img;
    document.getElementById('img-zone').style.display='none';
  }else removeImg();
  document.getElementById('btn-del').style.display='inline-block';
  document.getElementById('modal-bg').classList.add('open');
}
function closeModal(){document.getElementById('modal-bg').classList.remove('open')}

function saveEvent(){
  const title=document.getElementById('f-title').value.trim();
  const year=parseInt(document.getElementById('f-year').value);
  const fi=document.getElementById('f-title');
  if(!title||isNaN(year)){fi.style.borderColor='#e03b5a';fi.focus();return}
  fi.style.borderColor='';
  const desc=document.getElementById('f-desc').value.trim();
  const cat=document.getElementById('f-cat').value;
  if(editId)Object.assign(events.find(e=>e.id===editId),{title,year,desc,cat,img:pendingImg});
  else events.push({id:nextId++,title,year,desc,cat,img:pendingImg});
  saveEv();closeModal();render();updZoom();
}
function deleteEvent(){
  if(!editId||!confirm('Supprimer cet événement définitivement ?'))return;
  events=events.filter(e=>e.id!==editId);
  saveEv();closeModal();render();updZoom();
}

/* ══ DRAG / ZOOM / TOUCH ══ */
wrap.addEventListener('mousedown',e=>{if(e.target.dataset.id)return;dragging=true;dsx=e.clientX;dsox=offsetX;wrap.classList.add('dragging')});
window.addEventListener('mousemove',e=>{if(!dragging)return;offsetX=dsox+(e.clientX-dsx);render()});
window.addEventListener('mouseup',()=>{dragging=false;wrap.classList.remove('dragging')});
wrap.addEventListener('wheel',e=>{
  e.preventDefault();
  const f=e.deltaY<0?1.18:1/1.18;
  const mx=e.clientX-wrap.getBoundingClientRect().left;
  const{minY}=getRange();
  const yam=(mx-80-offsetX)/scale+minY;
  scale*=f;offsetX=mx-80-(yam-minY)*scale;
  render();updZoom();
},{passive:false});
let ltx=null,ltd=null;
wrap.addEventListener('touchstart',e=>{ltx=e.touches[0].clientX;if(e.touches.length===2)ltd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY)},{passive:true});
wrap.addEventListener('touchmove',e=>{
  if(e.touches.length===2&&ltd){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);scale*=d/ltd;ltd=d;render();updZoom()}
  else if(ltx){offsetX+=e.touches[0].clientX-ltx;ltx=e.touches[0].clientX;render()}
},{passive:true});
wrap.addEventListener('touchend',()=>{ltx=null;ltd=null});

/* ══ KEYBOARD ══ */
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeModal();closeCard();clearSearch()}
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();document.getElementById('search-input').focus()}
});

/* ══ CLOSE search on outside click ══ */
document.addEventListener('click',e=>{
  if(!document.getElementById('search-results').contains(e.target)&&e.target!==document.getElementById('search-input'))
    document.getElementById('search-results').classList.remove('open');
});

window.addEventListener('resize',render);
window.addEventListener('load',()=>setTimeout(resetView,80));
</script>
