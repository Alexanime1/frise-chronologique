<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ma Frise Chronologique</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f4f0; --bg3: #ebebeb;
    --text: #1a1a18; --text2: #5f5e5a; --text3: #9a9890;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --radius: 8px; --radius-lg: 12px;
    --font: system-ui, -apple-system, 'Segoe UI', sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg2: #252523; --bg3: #2e2e2c;
      --text: #e8e6dc; --text2: #9a9890; --text3: #5f5e5a;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
    }
  }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }
  #app { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }

  header { margin-bottom: 2rem; }
  header h1 { font-size: 26px; font-weight: 600; letter-spacing: -0.5px; }
  header p { font-size: 14px; color: var(--text2); margin-top: 4px; }

  .toolbar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }
  .toolbar button {
    font-size: 13px; padding: 7px 16px;
    border: 0.5px solid var(--border2); border-radius: var(--radius);
    background: var(--bg); color: var(--text); cursor: pointer;
    font-family: var(--font); transition: background .15s;
  }
  .toolbar button:hover { background: var(--bg2); }
  .toolbar button.primary { background: var(--text); color: var(--bg); border-color: var(--text); font-weight: 500; }
  .toolbar button.primary:hover { opacity: 0.85; }
  .zoom-label { font-size: 12px; color: var(--text2); min-width: 44px; text-align: center; }
  .sep { width: 0.5px; height: 20px; background: var(--border); flex-shrink: 0; }

  #tl-wrap {
    border: 0.5px solid var(--border); border-radius: var(--radius-lg);
    background: var(--bg2); overflow: hidden;
    cursor: grab; user-select: none; position: relative;
  }
  #tl-wrap.dragging { cursor: grabbing; }
  #tl-svg { display: block; width: 100%; }

  .legend { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 12px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); cursor: pointer; transition: opacity .15s; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* Tooltip */
  #tooltip {
    position: fixed; pointer-events: none;
    background: var(--bg); border: 0.5px solid var(--border2);
    border-radius: var(--radius); padding: 8px 12px;
    font-size: 12px; color: var(--text); z-index: 50;
    max-width: 230px; line-height: 1.5;
    box-shadow: 0 4px 16px rgba(0,0,0,0.1); display: none;
  }
  #tooltip strong { display: block; font-weight: 500; font-size: 13px; margin-bottom: 2px; }

  /* Modal */
  #modal-bg {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.4); z-index: 100;
    align-items: center; justify-content: center;
  }
  #modal-bg.open { display: flex; }
  #modal {
    background: var(--bg); border: 0.5px solid var(--border2);
    border-radius: var(--radius-lg); padding: 1.75rem;
    width: min(440px, 92vw); max-height: 90vh; overflow-y: auto;
  }
  #modal h2 { font-size: 17px; font-weight: 500; margin-bottom: 1.25rem; }
  .form-row { margin-bottom: 14px; }
  .form-row label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 5px; }
  .form-row input, .form-row textarea, .form-row select {
    width: 100%; font-size: 14px; font-family: var(--font);
    border: 0.5px solid var(--border2); border-radius: var(--radius);
    background: var(--bg2); color: var(--text); padding: 8px 11px;
    outline: none; transition: border-color .15s;
  }
  .form-row input:focus, .form-row textarea:focus, .form-row select:focus { border-color: var(--text3); }
  .form-row textarea { height: 90px; resize: vertical; }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; flex-wrap: wrap; }
  .btn-primary { background: var(--text); color: var(--bg); border: none; border-radius: var(--radius); padding: 9px 20px; font-size: 13px; font-family: var(--font); cursor: pointer; font-weight: 500; }
  .btn-cancel { background: transparent; color: var(--text2); border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 9px 16px; font-size: 13px; font-family: var(--font); cursor: pointer; }
  .btn-del { background: transparent; color: #c0392b; border: 0.5px solid var(--border); border-radius: var(--radius); padding: 9px 14px; font-size: 13px; font-family: var(--font); cursor: pointer; margin-right: auto; }

  footer { margin-top: 2.5rem; padding-top: 1rem; border-top: 0.5px solid var(--border); font-size: 12px; color: var(--text3); text-align: center; }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>📅 Ma Frise Chronologique</h1>
    <p>Zoomez avec la molette, déplacez en glissant, cliquez sur un événement pour le modifier.</p>
  </header>

  <div class="toolbar">
    <button onclick="zoom(-1)">− Zoom</button>
    <span class="zoom-label" id="zoom-lbl">100%</span>
    <button onclick="zoom(1)">+ Zoom</button>
    <div class="sep"></div>
    <button onclick="resetView()">Vue d'ensemble</button>
    <div class="sep"></div>
    <button class="primary" onclick="openAddModal()">+ Ajouter un événement</button>
  </div>

  <div id="tl-wrap">
    <svg id="tl-svg" height="300"></svg>
  </div>

  <div class="legend" id="legend"></div>

  <footer>Frise chronologique personnelle — données sauvegardées dans votre navigateur</footer>
</div>

<div id="tooltip"></div>

<div id="modal-bg">
  <div id="modal">
    <h2 id="modal-title">Nouvel événement</h2>
    <div class="form-row"><label>Titre *</label><input id="f-title" type="text" placeholder="Ex : Révolution française"/></div>
    <div class="form-row"><label>Année * (négatif = avant J.-C.)</label><input id="f-year" type="number" placeholder="Ex : 1789 ou -44"/></div>
    <div class="form-row"><label>Description</label><textarea id="f-desc" placeholder="Quelques mots sur cet événement…"></textarea></div>
    <div class="form-row"><label>Catégorie</label>
      <select id="f-cat">
        <option value="politique">Politique</option>
        <option value="science">Science &amp; Technologie</option>
        <option value="art">Art &amp; Culture</option>
        <option value="guerre">Guerre &amp; Conflit</option>
        <option value="autre">Autre</option>
      </select>
    </div>
    <div class="modal-btns">
      <button class="btn-del" id="btn-del" onclick="deleteEvent()" style="display:none">Supprimer</button>
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-primary" onclick="saveEvent()">Enregistrer</button>
    </div>
  </div>
</div>

<script>
const CATS = {
  politique: { color: '#5A6FC7', label: 'Politique' },
  science:   { color: '#2EA87E', label: 'Science & Technologie' },
  art:       { color: '#E0914A', label: 'Art & Culture' },
  guerre:    { color: '#C9524A', label: 'Guerre & Conflit' },
  autre:     { color: '#7A7A7A', label: 'Autre' }
};

const STORAGE_KEY = 'frise_events';
const DEFAULT_EVENTS = [
  { id:1,  year:-3000, title:"Invention de l'écriture",      desc:"Les Sumériens inventent l'écriture cunéiforme en Mésopotamie.", cat:'science' },
  { id:2,  year:-44,   title:"Mort de Jules César",           desc:"Assassiné aux Ides de Mars au Sénat de Rome.", cat:'politique' },
  { id:3,  year:1453,  title:"Chute de Constantinople",       desc:"Fin de l'Empire romain d'Orient, prise par Mehmed II.", cat:'guerre' },
  { id:4,  year:1492,  title:"Christophe Colomb",             desc:"Découverte de l'Amérique pour les Européens.", cat:'politique' },
  { id:5,  year:1687,  title:"Principia de Newton",           desc:"Publication des lois de la gravitation universelle.", cat:'science' },
  { id:6,  year:1789,  title:"Révolution française",          desc:"Prise de la Bastille, fin de l'Ancien Régime.", cat:'politique' },
  { id:7,  year:1865,  title:"Fin de la guerre de Sécession", desc:"Abolition de l'esclavage aux États-Unis.", cat:'guerre' },
  { id:8,  year:1905,  title:"Théorie de la relativité",      desc:"Einstein publie ses travaux sur la relativité restreinte.", cat:'science' },
  { id:9,  year:1945,  title:"Fin de la Seconde Guerre mondiale", desc:"Capitulation de l'Allemagne et du Japon.", cat:'guerre' },
  { id:10, year:1969,  title:"Premiers pas sur la Lune",      desc:"Neil Armstrong marche sur la Lune lors d'Apollo 11.", cat:'science' },
  { id:11, year:2004,  title:"Naissance de Facebook",         desc:"Mark Zuckerberg lance le réseau social depuis Harvard.", cat:'science' },
];

function loadEvents() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    return saved ? JSON.parse(saved) : DEFAULT_EVENTS;
  } catch(e) { return DEFAULT_EVENTS; }
}
function saveEvents() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(events)); } catch(e) {}
}

let events = loadEvents();
let nextId = Math.max(...events.map(e=>e.id), 0) + 1;
let scale = 1;
let offsetX = 0;
let svgW = 800;
const H = 300;
const AXIS_Y = 165;
let editingId = null;
let dragging = false, dragStartX = 0, dragStartOffset = 0;
let hiddenCats = new Set();

const svgEl = document.getElementById('tl-svg');
const wrap = document.getElementById('tl-wrap');
const tooltip = document.getElementById('tooltip');

function getRange() {
  if (!events.length) return { minY: 0, maxY: 2024 };
  return { minY: Math.min(...events.map(e=>e.year)), maxY: Math.max(...events.map(e=>e.year)) };
}

function yearToX(year) {
  const { minY } = getRange();
  return 80 + (year - minY) * scale + offsetX;
}

function computeDefaultScale() {
  const { minY, maxY } = getRange();
  const range = maxY - minY || 1;
  return Math.max(0.001, (svgW - 160) / range);
}

function resetView() {
  scale = computeDefaultScale();
  offsetX = 0;
  render();
  updateZoomLabel();
}

function zoom(dir) {
  const factor = dir > 0 ? 1.5 : 1/1.5;
  scale *= factor;
  render();
  updateZoomLabel();
}

function updateZoomLabel() {
  const base = computeDefaultScale();
  document.getElementById('zoom-lbl').textContent = Math.round(scale/base*100) + '%';
}

function getTickInterval() {
  const yearsVisible = svgW / scale;
  for (const iv of [1,2,5,10,25,50,100,200,500,1000,2000,5000,10000]) {
    if (svgW / (yearsVisible / iv) > 70) return iv;
  }
  return 10000;
}

function render() {
  svgW = wrap.clientWidth || 800;
  svgEl.setAttribute('width', svgW);
  svgEl.setAttribute('height', H);

  const { minY, maxY } = getRange();
  const iv = getTickInterval();
  let html = '';

  // Axis
  html += `<line x1="0" y1="${AXIS_Y}" x2="${svgW}" y2="${AXIS_Y}" stroke="var(--border2)" stroke-width="1.5"/>`;

  // Ticks
  const startT = Math.ceil((minY - iv*2) / iv) * iv;
  const endT   = Math.floor((maxY + iv*2) / iv) * iv;
  for (let y = startT; y <= endT; y += iv) {
    const x = yearToX(y);
    if (x < -5 || x > svgW + 5) continue;
    html += `<line x1="${x}" y1="${AXIS_Y-7}" x2="${x}" y2="${AXIS_Y+7}" stroke="var(--border2)" stroke-width="1"/>`;
    const lbl = y < 0 ? Math.abs(y) + ' av.' : y === 0 ? '0' : y;
    html += `<text x="${x}" y="${AXIS_Y+22}" text-anchor="middle" font-size="11" fill="var(--text3)" font-family="var(--font)">${lbl}</text>`;
  }

  // Place events
  const visible = events.filter(e => !hiddenCats.has(e.cat)).sort((a,b)=>a.year-b.year);
  const placed = [];
  const rowLastX = {};

  visible.forEach((ev, i) => {
    const x = yearToX(ev.year);
    let row = i % 2 === 0 ? -1 : 1;
    for (let tries = 0; tries < 8; tries++) {
      const key = row;
      if (!rowLastX[key] || x - rowLastX[key] > 85) { rowLastX[key] = x; break; }
      row = row < 0 ? row - 1 : row + 1;
    }
    placed.push({...ev, row, x});
  });

  placed.forEach(ev => {
    const x = ev.x;
    if (x < -50 || x > svgW + 50) return;
    const cat = CATS[ev.cat] || CATS.autre;
    const c = cat.color;
    const above = ev.row < 0;
    const stemLen = Math.min(55 + Math.abs(ev.row) * 30, 115);
    const labelY = above ? AXIS_Y - stemLen : AXIS_Y + stemLen;
    const label = ev.title.length > 22 ? ev.title.slice(0,21)+'…' : ev.title;
    const boxW = Math.min(label.length * 7 + 24, 165);
    const boxH = 34;
    const boxX = Math.max(2, Math.min(x - boxW/2, svgW - boxW - 2));
    const boxY = above ? labelY - boxH : labelY;
    const yearStr = ev.year < 0 ? Math.abs(ev.year)+' av. J.-C.' : ev.year;

    html += `<line x1="${x}" y1="${AXIS_Y}" x2="${x}" y2="${labelY}" stroke="${c}" stroke-width="1" stroke-dasharray="3 3" opacity="0.55"/>`;
    html += `<circle cx="${x}" cy="${AXIS_Y}" r="5.5" fill="${c}" stroke="var(--bg2)" stroke-width="2" style="cursor:pointer" data-id="${ev.id}"/>`;
    html += `<rect x="${boxX}" y="${boxY}" width="${boxW}" height="${boxH}" rx="7" fill="${c}" opacity="0.13" stroke="${c}" stroke-width="0.75" style="cursor:pointer" data-id="${ev.id}"/>`;
    html += `<text x="${boxX + boxW/2}" y="${boxY+14}" text-anchor="middle" font-size="11.5" font-weight="500" fill="${c}" font-family="var(--font)" style="cursor:pointer" data-id="${ev.id}">${label}</text>`;
    html += `<text x="${boxX + boxW/2}" y="${boxY+27}" text-anchor="middle" font-size="10" fill="${c}" opacity="0.75" font-family="var(--font)" style="cursor:pointer" data-id="${ev.id}">${yearStr}</text>`;
  });

  svgEl.innerHTML = html;

  svgEl.querySelectorAll('[data-id]').forEach(el => {
    const id = parseInt(el.dataset.id);
    el.addEventListener('click', () => openEditModal(id));
    el.addEventListener('mousemove', e => showTooltip(e, id));
    el.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
  });

  renderLegend();
}

function showTooltip(e, id) {
  const ev = events.find(x=>x.id===id);
  if (!ev) return;
  const cat = CATS[ev.cat] || CATS.autre;
  tooltip.style.display = 'block';
  tooltip.style.left = (e.clientX + 16) + 'px';
  tooltip.style.top  = (e.clientY - 24) + 'px';
  const yr = ev.year < 0 ? Math.abs(ev.year)+' av. J.-C.' : ev.year;
  tooltip.innerHTML = `<strong>${ev.title}</strong><span style="color:${cat.color}">${yr} · ${cat.label}</span>${ev.desc ? '<br><span style="color:var(--text2);font-size:11px">'+ev.desc.slice(0,90)+(ev.desc.length>90?'…':'')+'</span>' : ''}`;
}

function renderLegend() {
  document.getElementById('legend').innerHTML = Object.entries(CATS).map(([k,v]) => {
    const op = hiddenCats.has(k) ? 'opacity:0.35' : '';
    return `<div class="legend-item" style="${op}" onclick="toggleCat('${k}')"><div class="legend-dot" style="background:${v.color}"></div>${v.label}</div>`;
  }).join('');
}

function toggleCat(k) {
  if (hiddenCats.has(k)) hiddenCats.delete(k); else hiddenCats.add(k);
  render();
}

// Drag
wrap.addEventListener('mousedown', e => {
  if (e.target.dataset.id) return;
  dragging = true; dragStartX = e.clientX; dragStartOffset = offsetX;
  wrap.classList.add('dragging');
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  offsetX = dragStartOffset + (e.clientX - dragStartX);
  render();
});
window.addEventListener('mouseup', () => { dragging = false; wrap.classList.remove('dragging'); });

// Wheel zoom
wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.18 : 1/1.18;
  const mx = e.clientX - wrap.getBoundingClientRect().left;
  const { minY } = getRange();
  const yearAtMouse = (mx - 80 - offsetX) / scale + minY;
  scale *= factor;
  offsetX = mx - 80 - (yearAtMouse - minY) * scale;
  render(); updateZoomLabel();
}, { passive: false });

// Touch
let lastTX = null, lastTDist = null;
wrap.addEventListener('touchstart', e => {
  lastTX = e.touches[0].clientX;
  if (e.touches.length === 2) {
    lastTDist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
  }
}, { passive: true });
wrap.addEventListener('touchmove', e => {
  if (e.touches.length === 2 && lastTDist) {
    const dist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    scale *= dist / lastTDist; lastTDist = dist;
    render(); updateZoomLabel();
  } else if (lastTX) {
    offsetX += e.touches[0].clientX - lastTX;
    lastTX = e.touches[0].clientX;
    render();
  }
}, { passive: true });
wrap.addEventListener('touchend', () => { lastTX = null; lastTDist = null; });

// Modal
function openAddModal() {
  editingId = null;
  document.getElementById('modal-title').textContent = 'Nouvel événement';
  document.getElementById('f-title').value = '';
  document.getElementById('f-year').value = new Date().getFullYear();
  document.getElementById('f-desc').value = '';
  document.getElementById('f-cat').value = 'autre';
  document.getElementById('btn-del').style.display = 'none';
  document.getElementById('modal-bg').classList.add('open');
  setTimeout(() => document.getElementById('f-title').focus(), 50);
}

function openEditModal(id) {
  const ev = events.find(e=>e.id===id);
  if (!ev) return;
  editingId = id;
  document.getElementById('modal-title').textContent = 'Modifier l\'événement';
  document.getElementById('f-title').value = ev.title;
  document.getElementById('f-year').value = ev.year;
  document.getElementById('f-desc').value = ev.desc || '';
  document.getElementById('f-cat').value = ev.cat;
  document.getElementById('btn-del').style.display = 'inline-block';
  document.getElementById('modal-bg').classList.add('open');
}

function closeModal() { document.getElementById('modal-bg').classList.remove('open'); }

function saveEvent() {
  const title = document.getElementById('f-title').value.trim();
  const year  = parseInt(document.getElementById('f-year').value);
  const fi = document.getElementById('f-title');
  if (!title || isNaN(year)) { fi.style.borderColor='#c0392b'; fi.focus(); return; }
  fi.style.borderColor='';
  const desc = document.getElementById('f-desc').value.trim();
  const cat  = document.getElementById('f-cat').value;
  if (editingId) {
    Object.assign(events.find(e=>e.id===editingId), { title, year, desc, cat });
  } else {
    events.push({ id: nextId++, title, year, desc, cat });
  }
  saveEvents();
  closeModal();
  render(); updateZoomLabel();
}

function deleteEvent() {
  if (!editingId) return;
  if (!confirm('Supprimer cet événement ?')) return;
  events = events.filter(e=>e.id!==editingId);
  saveEvents(); closeModal(); render(); updateZoomLabel();
}

document.getElementById('modal-bg').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(); });
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });
window.addEventListener('resize', render);
window.addEventListener('load', resetView);
</script>
</body>
</html>
